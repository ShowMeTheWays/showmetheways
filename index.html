<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indoor AR Pro - Smart Navigation</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1a73e8; /* Google Blue */
            --record: #ea4335; /* Google Red */
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Sarabun', sans-serif; background: #000; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }

        .header-box {
            background: var(--glass); backdrop-filter: blur(10px);
            margin: 15px; padding: 15px; border-radius: 20px;
            box-shadow: var(--shadow); pointer-events: auto; text-align: center;
        }

        .footer-box {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-top-left-radius: 25px; border-top-right-radius: 25px; pointer-events: auto;
        }

        input, select, button {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd;
            font-size: 16px; margin-bottom: 10px; font-family: 'Sarabun'; outline: none; box-sizing: border-box;
        }

        .btn-primary { background: var(--primary); color: white; font-weight: bold; border: none; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }
        .btn-record { background: var(--record); color: white; font-weight: bold; border: none; box-shadow: 0 4px 10px rgba(234,67,53,0.3); }
        
        .mode-switch {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5);
            color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; pointer-events: auto; cursor: pointer;
        }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white;
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* สไตล์หน้าจอแอดมิน */
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <i class="fa-solid fa-map-location-dot" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>ระบบนำทางอัจฉริยะ</h2>
        <p style="color: #666; margin-bottom: 30px;">เตรียมพร้อมเข้าสู่โลก AR</p>
        <button class="btn-primary" onclick="initApp()" style="width: 80%;">เริ่มใช้งานระบบ</button>
    </div>

    <div class="ui-layer" id="user-panel">
        <div class="mode-switch" onclick="toggleMode()"><i class="fa-solid fa-gear"></i> สร้างเส้นทาง</div>
        <div class="header-box">
            <h3 id="target-name" style="margin: 0; color: var(--primary);">จุดหมายปลายทาง</h3>
            <p id="dist-info" style="margin: 5px 0 0 0; font-size: 14px; color: #666;">กรุณาเลือกสถานที่จากเมนูด้านล่าง</p>
        </div>
        <div class="footer-box">
            <select id="dest-dropdown">
                <option value="">-- ค้นหาห้องหรือแผนก --</option>
            </select>
        </div>
    </div>

    <div class="ui-layer" id="admin-panel">
        <div class="mode-switch" onclick="toggleMode()"><i class="fa-solid fa-xmark"></i> ปิดโหมดแอดมิน</div>
        <div class="header-box" style="border: 2px solid var(--record);">
            <h3 style="margin: 0; color: var(--record);"><i class="fa-solid fa-record-vinyl"></i> โหมดบันทึกเส้นทาง</h3>
            <p id="record-status" style="margin: 5px 0 0 0; font-size: 14px;">จำนวนจุดที่บันทึกแล้ว: 0 จุด</p>
        </div>
        <div class="footer-box">
            <input type="text" id="new-room-name" placeholder="ชื่อห้อง/จุดหมาย (เช่น ห้องตรวจ A)">
            <button class="btn-primary" onclick="addNode()" style="background: #34a853; margin-bottom: 10px;">
                <i class="fa-solid fa-location-crosshairs"></i> วางจุด (Node) ตรงนี้
            </button>
            <button class="btn-record" onclick="saveRoute()">
                <i class="fa-solid fa-cloud-arrow-up"></i> บันทึกเส้นทางทั้งหมด
            </button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" vr-mode-ui="enabled: false">
        <a-camera id="main-camera" rotation-reader></a-camera>
        <a-entity id="ar-world-container"></a-entity>
    </a-scene>

    <script>
        // *** เอา URL จาก Apps Script มาใส่ตรงนี้ ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxNUiCFErSC5my8UbPfsSxH1QKfIaaMSq2qZM91yVv8_jMvPvDUW-CuNxgq_LTJXU2-Gw/exec"; 
        
        let pathsData = []; // เก็บข้อมูลเส้นทางทั้งหมดที่โหลดมา
        let recordingNodes = []; // เก็บจุดที่แอดมินกำลังเดินบันทึก
        let isAdminMode = false;
        
        let currentCompass = 0;
        let myPos = { x: 0, z: 0 }; // พิกัดจำลองของเราในระบบ

        async function initApp() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            window.addEventListener('deviceorientation', (e) => {
                currentCompass = e.webkitCompassHeading || (360 - e.alpha);
            });

            document.getElementById('splash').style.display = 'none';
            loadRoutes();
        }

        // 1. โหลดข้อมูลเส้นทางมาใส่ Dropdown
        async function loadRoutes() {
            try {
                const res = await fetch(GAS_URL);
                pathsData = await res.json();
                
                const dropdown = document.getElementById('dest-dropdown');
                dropdown.innerHTML = '<option value="">-- ค้นหาห้องหรือแผนก --</option>'; // Reset
                
                pathsData.forEach(path => {
                    const opt = document.createElement('option');
                    opt.value = path.id;
                    opt.text = `📍 ${path.name}`;
                    dropdown.appendChild(opt);
                });
            } catch (err) { console.log("Offline mode หรือ โหลดข้อมูลไม่สำเร็จ"); }
        }

        // 2. ระบบสลับโหมด
        function toggleMode() {
            isAdminMode = !isAdminMode;
            document.getElementById('user-panel').style.display = isAdminMode ? 'none' : 'flex';
            document.getElementById('admin-panel').style.display = isAdminMode ? 'flex' : 'none';
            document.getElementById('ar-world-container').innerHTML = ''; // ล้างฉาก
            if(isAdminMode) {
                recordingNodes = []; // เริ่มบันทึกใหม่
                document.getElementById('record-status').innerText = "กดปุ่ม 'วางจุด' เมื่อถึงทางเลี้ยว";
            }
        }

        // 3. ระบบผู้ใช้งาน: วาดเส้นทางที่โหลดมา
        document.getElementById('dest-dropdown').onchange = function() {
            const selectedPath = pathsData.find(p => p.id === this.value);
            if(selectedPath) {
                document.getElementById('target-name').innerText = "กำลังไป: " + selectedPath.name;
                draw3DPath(selectedPath.nodes, selectedPath.name);
            }
        };

        function draw3DPath(nodes, targetName) {
            const world = document.getElementById('ar-world-container');
            world.innerHTML = ''; 
            if(nodes.length === 0) return;

            // สร้างเส้นทางต่อกันทีละท่อน (เหมือนท่อ/โถงทางเดิน)
            for(let i = 0; i < nodes.length - 1; i++) {
                const line = document.createElement('a-entity');
                line.setAttribute('line', `start: ${nodes[i].x} -1 ${nodes[i].z}; end: ${nodes[i+1].x} -1 ${nodes[i+1].z}; color: #1a73e8; opacity: 0.8`);
                world.appendChild(line);
                
                // วางลูกศรเรืองแสงตามพื้นทางเดิน
                const arrow = document.createElement('a-triangle');
                arrow.setAttribute('color', '#8ab4f8');
                arrow.setAttribute('position', `${nodes[i].x} -0.9 ${nodes[i].z}`);
                arrow.setAttribute('rotation', `-90 0 0`);
                arrow.setAttribute('scale', '0.2 0.2 0.2');
                world.appendChild(arrow);
            }

            // วาดหมุดเป้าหมายปลายทาง (สวยงามและดูง่ายขึ้น)
            const endNode = nodes[nodes.length - 1];
            const marker = document.createElement('a-entity');
            marker.setAttribute('position', `${endNode.x} 0 ${endNode.z}`);

            const pin = document.createElement('a-cone');
            pin.setAttribute('color', '#ea4335'); pin.setAttribute('height', '0.8');
            pin.setAttribute('radius-bottom', '0.3'); pin.setAttribute('radius-top', '0');
            pin.setAttribute('rotation', '180 0 0'); pin.setAttribute('position', '0 0.5 0');
            marker.appendChild(pin);

            const label = document.createElement('a-text');
            label.setAttribute('value', targetName); label.setAttribute('align', 'center');
            label.setAttribute('position', '0 1.2 0'); label.setAttribute('scale', '2 2 2');
            label.setAttribute('color', '#ffffff');
            // ทำกรอบหลังข้อความให้ชัดเจน
            label.setAttribute('geometry', 'primitive: plane; width: auto; height: 0.4');
            label.setAttribute('material', 'color: #333; opacity: 0.8; shader: flat');
            marker.appendChild(label);

            world.appendChild(marker);
        }

        // 4. ระบบแอดมิน: การบันทึกจุด (Manual Node Dropping)
        // **วิธีนี้แม่นยำที่สุดในโลกเว็บ AR: ให้แอดมินเดินไปถึงจุดเลี้ยว แล้วกดวางจุด**
        function addNode() {
            // คำนวณพิกัดจำลองจากการหันกล้อง (อิงจากก้าวเดินคร่าวๆ)
            // ในทางปฏิบัติ เราจะจำลองระยะห่างจุดละ 2 เมตรตามทิศที่กำลังหัน
            let distance = recordingNodes.length === 0 ? 0 : 2; 
            let rad = currentCompass * (Math.PI / 180);
            
            myPos.x += Math.sin(rad) * distance;
            myPos.z -= Math.cos(rad) * distance; // AR Z แกนลบคือเดินไปข้างหน้า

            recordingNodes.push({ x: myPos.x.toFixed(2), z: myPos.z.toFixed(2) });
            
            document.getElementById('record-status').innerText = `บันทึกแล้ว: ${recordingNodes.length} จุด`;
            
            // วาดจุดให้แอดมินเห็นว่าวางไปแล้วตรงไหน
            const dot = document.createElement('a-sphere');
            dot.setAttribute('position', `${myPos.x} -1 ${myPos.z}`);
            dot.setAttribute('radius', '0.1'); dot.setAttribute('color', '#34a853');
            document.getElementById('ar-world-container').appendChild(dot);
        }

        // 5. ระบบแอดมิน: ส่งข้อมูลกลับไปบันทึก
        function saveRoute() {
            const roomName = document.getElementById('new-room-name').value;
            if(!roomName || recordingNodes.length < 2) {
                alert("กรุณาใส่ชื่อห้องและวางจุดอย่างน้อย 2 จุด (จุดเริ่มและจุดจบ)");
                return;
            }

            const payload = { roomName: roomName, floor: "1", nodes: recordingNodes };

            document.getElementById('record-status').innerText = "กำลังบันทึก...";
            
            // ส่งข้อมูลแบบ POST
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } // ป้องกัน CORS
            }).then(res => res.json()).then(data => {
                alert("บันทึกเส้นทางสำเร็จ! ID: " + data.id);
                document.getElementById('new-room-name').value = '';
                toggleMode(); // กลับไปหน้าปกติ
                loadRoutes(); // โหลดข้อมูลใหม่เข้า Dropdown ทันที
            }).catch(err => alert("เกิดข้อผิดพลาด: " + err));
        }
    </script>
</body>
</html>
