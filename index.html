<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indoor AR Pro - Smart Navigation</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1a73e8; /* Google Blue */
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Sarabun', sans-serif;
            background-color: #000; /* กันหน้าขาว */
        }

        /* UI Overlay Structure */
        .app-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Header Style */
        .app-header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin: 15px; padding: 15px; border-radius: 20px;
            box-shadow: var(--shadow); pointer-events: auto;
            text-align: center; border: 1px solid rgba(255,255,255,0.3);
        }

        .status-dot {
            display: inline-block; width: 8px; height: 8px; 
            background: #34a853; border-radius: 50%; margin-right: 5px;
        }

        /* Footer Style */
        .app-footer {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 25px 20px 35px 20px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            pointer-events: auto;
        }

        select {
            width: 100%; padding: 15px; border-radius: 15px;
            border: 1px solid #ddd; font-size: 16px; appearance: none;
            background: white url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23666" d="M7 10l5 5 5-5z"/></svg>') no-repeat right 15px center;
            margin-bottom: 15px; outline: none;
        }

        .btn-primary {
            width: 100%; padding: 16px; border-radius: 15px;
            background: var(--primary); color: white; font-weight: 600;
            border: none; font-size: 16px; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.98); }

        /* AR Elements Style */
        #ar-canvas-container { position: absolute; top: 0; left: 0; z-index: 0; }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div style="font-size: 50px; color: var(--primary); margin-bottom: 20px;">
            <i class="fa-solid fa-compass-drafting fa-spin"></i>
        </div>
        <h2 style="color: #333; margin: 0;">Indoor AR Pro</h2>
        <p style="color: #666;">กำลังเตรียมระบบนำทางเสมือนจริง...</p>
        <button class="btn-primary" onclick="initAR()" style="width: 200px; margin-top: 30px;">เริ่มใช้งาน</button>
    </div>

    <div class="app-ui">
        <div class="app-header">
            <div id="nav-info">
                <span class="status-dot"></span>
                <span id="target-name" style="font-weight: 600;">รอกำหนดจุดหมาย</span>
            </div>
            <div id="dist-info" style="font-size: 13px; color: #555; margin-top: 5px;">
                ระบุพิกัดด้วยเซนเซอร์ความแม่นยำสูง
            </div>
        </div>

        <div class="app-footer">
            <label style="font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; display: block;">เลือกสถานที่ปลายทาง</label>
            <select id="dest-dropdown">
                <option value="">-- ค้นหาชื่อห้องหรือแผนก --</option>
            </select>
            <button class="btn-primary" onclick="confirmArrival()">
                <i class="fa-solid fa-check-circle"></i> ฉันถึงที่หมายแล้ว
            </button>
        </div>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" 
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-camera id="main-camera" rotation-reader position="0 1.6 0"></a-camera>
        <a-entity id="ar-world-container"></a-entity>
    </a-scene>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz6lcvIMQ8mNbfZSL6gQ3cphjMXUEMfQTKCz4RC3V6ULdQ4nrXIRitHsVfqLXtn1aOlRw/exec";
        let userPos = { x: 50, y: 90 }; 
        let locations = [];

        async function initAR() {
            // ขอสิทธิ์เซนเซอร์ทิศทาง (iOS)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }

            try {
                const res = await fetch(GAS_URL);
                locations = await res.json();
                
                const dropdown = document.getElementById('dest-dropdown');
                locations.forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify(loc);
                    opt.text = `📍 ${loc.name} (ชั้น ${loc.floor})`;
                    dropdown.appendChild(opt);
                });

                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 500);
            } catch (err) {
                alert("กรุณาเชื่อมต่ออินเทอร์เน็ตและตรวจสอบ GAS URL");
            }
        }

        document.getElementById('dest-dropdown').onchange = function() {
            if(!this.value) return;
            const target = JSON.parse(this.value);
            document.getElementById('target-name').innerText = target.name;
            updateARScene(target);
        };

        function updateARScene(target) {
            const world = document.getElementById('ar-world-container');
            world.innerHTML = ''; 

            // คำนวณพิกัด (1% = 1 เมตร)
            const dx = target.x - userPos.x;
            const dz = userPos.y - target.y;

            // --- วาดเส้นทาง (Line Path) ---
            const path = document.createElement('a-entity');
            path.setAttribute('line', {
                start: '0 -0.5 0',
                end: `${dx} -0.5 ${dz}`,
                color: '#1a73e8',
                opacity: 0.9
            });
            world.appendChild(path);

            // --- วาดหมุดหมาย 3D (Marker) ---
            const marker = document.createElement('a-entity');
            marker.setAttribute('position', `${dx} 0 ${dz}`);

            // ลูกศรชี้ลงสไตล์ Google
            const pin = document.createElement('a-cylinder');
            pin.setAttribute('radius', '0.1');
            pin.setAttribute('height', '1.5');
            pin.setAttribute('color', '#ea4335');
            pin.setAttribute('position', '0 0.75 0');
            marker.appendChild(pin);

            const ball = document.createElement('a-sphere');
            ball.setAttribute('radius', '0.3');
            ball.setAttribute('color', '#ea4335');
            ball.setAttribute('position', '0 1.5 0');
            marker.appendChild(ball);

            // ป้ายชื่อ
            const label = document.createElement('a-text');
            label.setAttribute('value', target.name);
            label.setAttribute('align', 'center');
            label.setAttribute('position', '0 2.2 0');
            label.setAttribute('scale', '2 2 2');
            label.setAttribute('color', '#333');
            label.setAttribute('geometry', 'primitive: plane; width: 1.5; height: 0.5');
            label.setAttribute('material', 'color: white; opacity: 0.8');
            marker.appendChild(label);

            world.appendChild(marker);

            const dist = Math.sqrt(dx*dx + dz*dz).toFixed(1);
            document.getElementById('dist-info').innerText = `ระยะทางประมาณ ${dist} เมตร`;
        }

        function confirmArrival() {
            const dropdown = document.getElementById('dest-dropdown');
            if(!dropdown.value) return;
            const target = JSON.parse(dropdown.value);
            alert("ยินดีด้วย! คุณถึง " + target.name + " แล้ว");
            userPos = { x: target.x, y: target.y };
            document.getElementById('ar-world-container').innerHTML = '';
            document.getElementById('target-name').innerText = "รอกำหนดจุดหมาย";
            dropdown.value = "";
        }
    </script>
</body>
</html>
