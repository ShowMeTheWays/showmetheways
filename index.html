<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hospital AR Nav</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans Thai', sans-serif;
  background: #111;
  color: #fff;
  height: 100dvh;
  overflow: hidden;
}

/* ── Screens ──────────────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 16px;
}
.screen.hidden { display: none; }

/* ── Loading ─────────────────────────────────────── */
#screen-loading { background: #111; text-align: center; }
#screen-loading p { color: #888; font-size: 15px; }

/* ── Select ──────────────────────────────────────── */
#screen-select {
  background: #111;
  justify-content: flex-start;
  padding-top: 48px;
  overflow-y: auto;
  align-items: stretch;
}
#screen-select h1 { font-size: 22px; margin-bottom: 8px; text-align: center; }

.pkg-block { margin-bottom: 8px; }
.pkg-header {
  background: #222;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pkg-header:active { background: #2a2a2a; }
.sub-list { display: none; padding: 6px 0 0 12px; gap: 6px; flex-direction: column; }
.sub-list.open { display: flex; }
.sub-btn {
  background: #1a2a3a;
  border: 1px solid #1e4060;
  border-radius: 8px;
  padding: 12px 16px;
  cursor: pointer;
  font-size: 14px;
  color: #7ec8ff;
  text-align: left;
  font-family: inherit;
  width: 100%;
}
.sub-btn:active { background: #1e3a55; }

/* ── Permission ──────────────────────────────────── */
#screen-permission { background: #111; text-align: center; }
#screen-permission h2 { font-size: 20px; margin-bottom: 8px; }
#screen-permission p { color: #aaa; font-size: 14px; line-height: 1.6; }

/* ── Reloc ───────────────────────────────────────── */
#screen-reloc { background: #111; text-align: center; }
#screen-reloc h2 { font-size: 20px; margin-bottom: 8px; }
#screen-reloc p { color: #aaa; font-size: 14px; line-height: 1.6; }

/* ── Navigation ──────────────────────────────────── */
#screen-nav { background: #000; padding: 0; justify-content: flex-start; }

#camera-feed {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

.nav-ui {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
}

/* Top bar */
.nav-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 52px 16px 16px;
}
.badge {
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  backdrop-filter: blur(6px);
}
#sensor-status { color: #4dff91; }
#sensor-status.warn { color: #ffb74d; }
#sensor-status.off  { color: #888; }

/* Arrow area */
.nav-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

#arrow-wrap {
  width: 160px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#nav-arrow {
  width: 120px;
  height: 120px;
  transition: transform 0.4s ease;
  filter: drop-shadow(0 0 16px rgba(0, 200, 255, 0.8));
}

#dist-label {
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(0,200,255,0.3);
  border-radius: 20px;
  padding: 6px 18px;
  font-size: 14px;
  font-weight: 600;
  color: #00c8ff;
  backdrop-filter: blur(6px);
}

/* Bottom card */
.nav-card {
  background: rgba(10,10,10,0.85);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  backdrop-filter: blur(12px);
  pointer-events: auto;
}

.nav-card-loc {
  font-size: 12px;
  color: #00c8ff;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.nav-card-instr {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 12px;
}
.nav-card-img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 12px;
  display: block;
  background: #1a1a1a;
}
.nav-card-img.hidden { display: none; }

.nav-card-row {
  display: flex;
  gap: 10px;
}
.btn-next {
  flex: 1;
  padding: 13px;
  background: #0077cc;
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
.btn-next:active { background: #005fa3; }
.btn-recal {
  padding: 13px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
}
.btn-recal:active { background: rgba(255,255,255,0.15); }

/* Progress dots */
.progress-dots {
  display: flex;
  gap: 5px;
  margin-bottom: 14px;
}
.dot {
  height: 4px;
  flex: 1;
  border-radius: 2px;
  background: #333;
}
.dot.done { background: #0055aa; }
.dot.active { background: #00c8ff; }

/* Waypoint label (small) */
#wp-label {
  font-size: 11px;
  color: #aaa;
  margin-bottom: 6px;
}

/* ── Arrived ─────────────────────────────────────── */
#screen-arrived { background: #111; text-align: center; }
#screen-arrived h2 { font-size: 24px; margin-bottom: 8px; }
#screen-arrived .dest { font-size: 20px; color: #4dff91; font-weight: 700; margin-bottom: 24px; }

/* ── Shared UI ───────────────────────────────────── */
.btn {
  width: 100%;
  max-width: 320px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary { background: #0077cc; color: #fff; }
.btn-primary:active { background: #005fa3; }
.btn-secondary {
  background: transparent;
  color: #888;
  border: 1px solid #333;
  font-size: 13px;
  padding: 10px;
}
.btn-secondary:active { background: #1a1a1a; }

#error-msg {
  color: #ff6b6b;
  font-size: 14px;
  text-align: center;
  min-height: 20px;
}
</style>
</head>
<body>

<!-- ── SCREEN: Loading ──────────────────────────────────── -->
<div id="screen-loading" class="screen">
  <p>⏳ กำลังโหลด...</p>
</div>

<!-- ── SCREEN: Select Package ──────────────────────────── -->
<div id="screen-select" class="screen hidden">
  <h1>เลือกบริการ</h1>
  <div id="pkg-list" style="width:100%;max-width:480px"></div>
  <div id="error-msg"></div>
</div>

<!-- ── SCREEN: Permission ──────────────────────────────── -->
<div id="screen-permission" class="screen hidden">
  <h2>ขออนุญาตใช้งาน</h2>
  <p>ระบบต้องการกล้องสำหรับ AR<br>และเซ็นเซอร์สำหรับระบุทิศทาง</p>
  <div id="error-msg"></div>
  <button class="btn btn-primary" id="btn-grant">อนุญาตและเริ่มต้น</button>
  <button class="btn btn-secondary" id="btn-skip-perm">ข้ามขั้นตอนนี้</button>
</div>

<!-- ── SCREEN: Relocalize ──────────────────────────────── -->
<div id="screen-reloc" class="screen hidden">
  <p style="font-size:48px">📍</p>
  <h2>ตั้งจุดเริ่มต้น</h2>
  <p>ยืนตรงจุด QR Code แล้วกดปุ่มด้านล่าง<br>เพื่อตั้งตำแหน่งของคุณเป็น (0, 0, 0)</p>
  <div id="error-msg"></div>
  <button class="btn btn-primary" id="btn-reloc">📍 ตั้งจุดนี้เป็น Origin</button>
  <button class="btn btn-secondary" id="btn-skip-reloc">ข้ามขั้นตอนนี้</button>
</div>

<!-- ── SCREEN: Navigation ──────────────────────────────── -->
<div id="screen-nav" class="screen hidden">
  <video id="camera-feed" autoplay playsinline muted></video>

  <div class="nav-ui">
    <!-- Top -->
    <div class="nav-top">
      <div class="badge" id="step-badge">ขั้นตอน 0/0</div>
      <div class="badge" id="sensor-status">⬜ Manual</div>
    </div>

    <!-- Arrow -->
    <div class="nav-center">
      <div id="arrow-wrap">
        <!-- Arrow SVG: ชี้ขึ้น = ตรงไปข้างหน้า -->
        <svg id="nav-arrow" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <!-- หัวลูกศร -->
          <polygon points="50,5 90,55 10,55" fill="#00c8ff"/>
          <!-- ลำลูกศร -->
          <rect x="38" y="52" width="24" height="50" rx="4" fill="#00c8ff" opacity="0.85"/>
        </svg>
      </div>
      <div id="dist-label">—</div>
    </div>

    <!-- Bottom card -->
    <div class="nav-card">
      <div class="progress-dots" id="progress-dots"></div>
      <div id="wp-label"></div>
      <div class="nav-card-loc" id="card-loc">—</div>
      <div class="nav-card-instr" id="card-instr">—</div>
      <img class="nav-card-img hidden" id="card-img" src="" alt="landmark">
      <div class="nav-card-row">
        <button class="btn-recal" id="btn-recal" title="Reset PDR position">🔄</button>
        <button class="btn-next" id="btn-next">ถัดไป →</button>
      </div>
    </div>
  </div>
</div>

<!-- ── SCREEN: Arrived ──────────────────────────────────── -->
<div id="screen-arrived" class="screen hidden">
  <p style="font-size:64px">✅</p>
  <h2>ถึงปลายทางแล้ว!</h2>
  <div class="dest" id="arrived-dest">—</div>
  <button class="btn btn-primary" id="btn-home">← กลับหน้าหลัก</button>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG — แก้ตรงนี้ก่อนใช้งาน
══════════════════════════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyQWSaycrGSoAEskXP2x6ItprpD3rddE03DbY2Vqohe5OuPMW10wy3oWKmZT3EeVRSM/exec'; // ← ใส่ URL ของ Apps Script ที่ Deploy แล้ว

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const S = {
  route:        null,   // { package, subPackage, steps[] }
  stepIdx:      0,      // step ปัจจุบัน (index ใน steps[])
  wpIdx:        0,      // waypoint ปัจจุบัน (index ใน step.waypoints[])
  pos:          { x: 0, z: 0 },
  heading:      0,      // degrees 0=North, 90=East (จาก compass)
  sensorMode:   'none', // 'full' | 'orient' | 'none'
  stepCount:    0,
  cameraStream: null,
};

/* ══════════════════════════════════════════════════════════
   API
══════════════════════════════════════════════════════════ */
async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}

/* ══════════════════════════════════════════════════════════
   SENSORS
══════════════════════════════════════════════════════════ */
const Sensors = {
  _inStep: false,
  _lastStepAt: 0,
  STEP_LEN:   0.72,   // เมตรต่อก้าว
  STEP_THR:   11.5,   // m/s² threshold
  STEP_COOL:  280,    // ms cooldown

  async requestPermissions() {
    let camOk = false, orientOk = false, motionOk = false;

    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      s.getTracks().forEach(t => t.stop());
      camOk = true;
    } catch(e) {}

    try {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        orientOk = (await DeviceOrientationEvent.requestPermission()) === 'granted';
      } else { orientOk = true; }
    } catch(e) { orientOk = true; }

    try {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        motionOk = (await DeviceMotionEvent.requestPermission()) === 'granted';
      } else { motionOk = true; }
    } catch(e) { motionOk = true; }

    return { camOk, orientOk, motionOk };
  },

  start() {
    // Compass heading
    const onOrient = (e) => {
      if (e.webkitCompassHeading !== undefined) {
        S.heading = e.webkitCompassHeading;           // iOS
      } else if (e.absolute && e.alpha !== null) {
        S.heading = (360 - e.alpha) % 360;            // Android absolute
      } else if (e.alpha !== null) {
        S.heading = (360 - e.alpha) % 360;            // Android fallback
      }
      if (S.sensorMode === 'none') {
        S.sensorMode = 'orient';
        updateSensorUI();
      }
    };
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);

    // Step counting (PDR)
    window.addEventListener('devicemotion', (e) => {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const mag = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
      const now = Date.now();

      if (!this._inStep && mag > this.STEP_THR) {
        this._inStep = true;
      } else if (this._inStep && mag < this.STEP_THR - 1.5 && now - this._lastStepAt > this.STEP_COOL) {
        this._inStep = false;
        this._lastStepAt = now;
        S.stepCount++;
        const rad = S.heading * Math.PI / 180;
        S.pos.x += Math.sin(rad) * this.STEP_LEN;
        S.pos.z += Math.cos(rad) * this.STEP_LEN;
        if (S.sensorMode === 'orient') { S.sensorMode = 'full'; updateSensorUI(); }
        Nav.tick();
      }
    });

    // Desktop testing: arrow keys simulate walking
    window.addEventListener('keydown', (e) => {
      const d = { ArrowUp: 0, ArrowDown: 180, ArrowLeft: 270, ArrowRight: 90 }[e.key];
      if (d !== undefined) {
        const rad = d * Math.PI / 180;
        S.pos.x += Math.sin(rad) * this.STEP_LEN;
        S.pos.z += Math.cos(rad) * this.STEP_LEN;
        if (d === 0) S.heading = 0; // face north when pressing up
        Nav.tick();
      }
    });
  },

  reset() {
    S.pos = { x: 0, z: 0 };
    S.stepCount = 0;
  }
};

function updateSensorUI() {
  const el = ge('sensor-status');
  if (S.sensorMode === 'full') {
    el.textContent = '🟢 PDR Active';
    el.className = 'badge';
    el.style.color = '#4dff91';
  } else if (S.sensorMode === 'orient') {
    el.textContent = '🟡 Compass';
    el.className = 'badge';
    el.style.color = '#ffb74d';
  } else {
    el.textContent = '⬜ Manual';
    el.className = 'badge';
    el.style.color = '#888';
  }
}

/* ══════════════════════════════════════════════════════════
   CAMERA
══════════════════════════════════════════════════════════ */
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const v = ge('camera-feed');
    v.srcObject = stream;
    await v.play();
    S.cameraStream = stream;
  } catch(e) {
    console.warn('Camera not available:', e.message);
    // ไม่มีกล้องก็ยังนำทางได้ (พื้นหลังดำ)
  }
}

function stopCamera() {
  if (S.cameraStream) {
    S.cameraStream.getTracks().forEach(t => t.stop());
    S.cameraStream = null;
  }
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
const PROX = 1.5; // เมตร — ถือว่า "ถึงแล้ว"

const Nav = {
  get step() { return S.route?.steps[S.stepIdx]; },
  get wp()   { return this.step?.waypoints[S.wpIdx]; },

  dist2d(wp) {
    return Math.sqrt((wp.x - S.pos.x)**2 + (wp.z - S.pos.z)**2);
  },

  bearing(wp) {
    const dx = wp.x - S.pos.x;
    const dz = wp.z - S.pos.z;
    let b = Math.atan2(dx, dz) * 180 / Math.PI;
    return (b + 360) % 360;
  },

  relAngle(wp) {
    let r = this.bearing(wp) - S.heading;
    while (r >  180) r -= 360;
    while (r < -180) r += 360;
    return r;
  },

  tick() {
    if (!this.wp) return;
    const d = this.dist2d(this.wp);
    updateArrow();
    if (d <= PROX) this.arrivedWp();
  },

  arrivedWp() {
    const step = this.step;
    const lastWp   = S.wpIdx >= step.waypoints.length - 1;
    const lastStep = S.stepIdx >= S.route.steps.length - 1;

    if (lastWp && lastStep) {
      // ถึงปลายทาง
      showScreen('arrived');
      ge('arrived-dest').textContent = step.locationName;
      stopCamera();
    } else if (lastWp) {
      // ถึง waypoint สุดท้ายของ step นี้ → ไป step ถัดไป
      S.stepIdx++;
      S.wpIdx = 0;
      renderStep();
    } else {
      // ถึง waypoint กลางทาง → ไป waypoint ถัดไปใน step เดียวกัน
      S.wpIdx++;
      renderWpHint();
      updateArrow();
    }
  },

  advanceManual() {
    const step = this.step;
    if (!step) return;
    const lastStep = S.stepIdx >= S.route.steps.length - 1;
    if (lastStep) {
      showScreen('arrived');
      ge('arrived-dest').textContent = step.locationName;
      stopCamera();
    } else {
      S.stepIdx++;
      S.wpIdx = 0;
      renderStep();
    }
  }
};

/* ══════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════ */
function renderStep() {
  const step  = Nav.step;
  const steps = S.route.steps;
  if (!step) return;

  ge('step-badge').textContent = `ขั้นตอน ${S.stepIdx + 1}/${steps.length}`;
  ge('card-loc').textContent   = step.locationName;
  ge('card-instr').textContent = step.instruction;

  const img = ge('card-img');
  if (step.imageURL) {
    img.src = step.imageURL;
    img.classList.remove('hidden');
  } else {
    img.classList.add('hidden');
  }

  // Progress dots (per step)
  const dotsEl = ge('progress-dots');
  dotsEl.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < S.stepIdx ? ' done' : i === S.stepIdx ? ' active' : '');
    dotsEl.appendChild(d);
  });

  // Next button text
  ge('btn-next').textContent = S.stepIdx >= steps.length - 1 ? '🏁 ถึงที่หมาย' : 'ถัดไป →';

  renderWpHint();
  updateArrow();
}

function renderWpHint() {
  const step = Nav.step;
  if (!step) return;
  const total = step.waypoints.length;
  if (total > 1) {
    ge('wp-label').textContent = `📍 จุดนำทาง ${S.wpIdx + 1}/${total}`;
  } else {
    ge('wp-label').textContent = '';
  }
}

function updateArrow() {
  const wp = Nav.wp;
  if (!wp) return;

  const d = Nav.dist2d(wp);
  const angle = Nav.relAngle(wp);

  ge('nav-arrow').style.transform = `rotate(${angle}deg)`;
  ge('dist-label').textContent = d < 1000 ? `${d.toFixed(1)} m` : `${(d/1000).toFixed(2)} km`;
}

// อัปเดต arrow ทุก 500ms แม้ไม่มี step event (เพื่ออัปเดต heading)
setInterval(() => { if (Nav.wp) updateArrow(); }, 500);

/* ══════════════════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════════════════ */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  ge('screen-' + name).classList.remove('hidden');
}

function renderPackages(packages) {
  const list = ge('pkg-list');
  list.innerHTML = '';

  packages.forEach(p => {
    const block = document.createElement('div');
    block.className = 'pkg-block';

    const header = document.createElement('div');
    header.className = 'pkg-header';
    header.innerHTML = `<span>${p.package}</span><span>›</span>`;

    const subList = document.createElement('div');
    subList.className = 'sub-list';
    p.subPackages.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'sub-btn';
      btn.textContent = sub;
      btn.onclick = () => selectRoute(p.package, sub);
      subList.appendChild(btn);
    });

    header.onclick = () => {
      const open = subList.classList.contains('open');
      document.querySelectorAll('.sub-list').forEach(el => el.classList.remove('open'));
      if (!open) subList.classList.add('open');
      header.querySelector('span:last-child').textContent = (!open) ? '⌄' : '›';
    };

    block.appendChild(header);
    block.appendChild(subList);
    list.appendChild(block);
  });
}

async function selectRoute(pkg, sub) {
  ge('error-msg').textContent = 'กำลังโหลดเส้นทาง...';
  try {
    const route = await apiGet({ action: 'route', pkg, sub });
    S.route    = route;
    S.stepIdx  = 0;
    S.wpIdx    = 0;
    ge('error-msg').textContent = '';
    showScreen('permission');
  } catch(e) {
    ge('error-msg').textContent = '❌ ' + e.message;
  }
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
async function init() {
  showScreen('loading');

  // Auto-select จาก QR Code URL parameter
  const params = new URLSearchParams(window.location.search);
  const qrPkg  = params.get('pkg');
  const qrSub  = params.get('sub');

  try {
    const packages = await apiGet({ action: 'packages' });
    renderPackages(packages);

    if (qrPkg && qrSub) {
      await selectRoute(qrPkg, qrSub);
    } else {
      showScreen('select');
    }
  } catch(e) {
    showScreen('select');
    ge('error-msg').textContent = '❌ โหลดข้อมูลไม่ได้: ' + e.message + '\n\nตรวจสอบ API_URL ใน index.html';
  }
}

/* ══════════════════════════════════════════════════════════
   EVENT LISTENERS
══════════════════════════════════════════════════════════ */
ge('btn-grant').onclick = async () => {
  const p = await Sensors.requestPermissions();
  if (!p.camOk && !p.orientOk) {
    ge('error-msg').textContent = 'ไม่สามารถเปิดกล้อง/เซ็นเซอร์ได้ — ลองกดข้าม';
    return;
  }
  ge('error-msg').textContent = '';
  showScreen('reloc');
};

ge('btn-skip-perm').onclick = () => {
  S.sensorMode = 'none';
  showScreen('reloc');
};

ge('btn-reloc').onclick = async () => {
  Sensors.reset();
  await startCamera();
  Sensors.start();
  showScreen('nav');
  renderStep();
  updateSensorUI();
};

ge('btn-skip-reloc').onclick = async () => {
  await startCamera();
  Sensors.start();
  showScreen('nav');
  renderStep();
  updateSensorUI();
};

ge('btn-next').onclick = () => Nav.advanceManual();
ge('btn-recal').onclick = () => { Sensors.reset(); };
ge('btn-home').onclick = () => {
  stopCamera();
  S.route   = null;
  S.stepIdx = 0;
  S.wpIdx   = 0;
  showScreen('select');
};

function ge(id) { return document.getElementById(id); }

// Start
init();
</script>
</body>
</html>
