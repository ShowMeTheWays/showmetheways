<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Hospital AR Nav</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        body { margin: 0; font-family: 'Kanit', sans-serif; overflow: hidden; background: #111; color: #333; }
        
        /* วิดีโอกล้องหลัง */
        #camera-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        
        /* หน้าจอโหลดข้อมูล */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }

        /* หน้าจอเลือกแพ็กเกจ */
        #menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { font-size: 28px; font-weight: bold; color: #0056b3; margin-bottom: 30px; text-align: center; }
        select { padding: 15px; margin: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; width: 85%; max-width: 350px; outline: none; }
        .btn-primary { background-color: #0056b3; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; width: 85%; max-width: 350px; margin-top: 15px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* UI นำทาง (AR Overlay) */
        #nav-container { position: absolute; bottom: 0; left: 0; width: 100%; display: none; flex-direction: column; align-items: center; padding-bottom: 30px; pointer-events: none; }
        .nav-card { background: rgba(255, 255, 255, 0.95); width: 90%; max-width: 400px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: auto; box-sizing: border-box; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .step-badge { background: #ff9800; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .distance-badge { background: #e0f7fa; color: #00838f; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        
        h2 { margin: 0 0 5px 0; font-size: 22px; color: #111; }
        p { margin: 0 0 15px 0; font-size: 16px; color: #555; line-height: 1.4; }
        img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        
        .btn-success { background-color: #28a745; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- พื้นหลังเป็นกล้องมือถือ -->
    <video id="camera-bg" autoplay playsinline></video>

    <div id="loading">กำลังเชื่อมต่อข้อมูล...</div>

    <!-- เมนูหลัก -->
    <div id="menu-screen">
        <div class="logo">AR Navigation<br><span style="font-size:18px; color:#666;">ระบบนำทางโรงพยาบาล</span></div>
        <select id="package-select">
            <option value="">-- กรุณาเลือกแพ็กเกจการตรวจ --</option>
        </select>
        <button class="btn-primary" onclick="startNavigation()">เริ่มนำทาง</button>
    </div>

    <!-- การ์ดนำทาง -->
    <div id="nav-container">
        <div class="nav-card">
            <div class="header-row">
                <span class="step-badge" id="step-badge">1 / 5</span>
                <span class="distance-badge" id="distance-badge">ระยะทาง: 0 ม.</span>
            </div>
            <h2 id="location-name">จุดเริ่มต้น</h2>
            <p id="instruction-text">กำลังค้นหาเส้นทาง...</p>
            <img id="landmark-img" src="" alt="Landmark" onerror="this.src='https://placehold.co/400x200?text=No+Image'">
            <button class="btn-success" id="next-btn" onclick="confirmArrival()">ฉันถึงจุดนี้แล้ว</button>
        </div>
    </div>

    <script>
        // =========================================================
        // นำ URL จาก Google Apps Script (ขั้นตอนที่ 2) มาวางในเครื่องหมายคำพูดด้านล่าง
        // =========================================================
        const API_URL = "วาง_URL_จาก_APPS_SCRIPT_ตรงนี้"; 
        
        let allData = [];
        let currentRoute = [];
        let currentIndex = 0;

        window.onload = async () => {
            initCamera();
            await loadData();
        };

        // เปิดกล้องมือถือ
        function initCamera() {
            const video = document.getElementById('camera-bg');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(stream => { video.srcObject = stream; })
                    .catch(err => { console.log("Camera Error:", err); });
            }
        }

        // โหลดข้อมูลจาก Sheet
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                
                // ดึงชื่อแพ็กเกจมาทำตัวเลือก
                const packages = [...new Set(allData.map(item => item.Package))];
                const select = document.getElementById('package-select');
                packages.forEach(pkg => {
                    if(pkg) select.innerHTML += `<option value="${pkg}">${pkg}</option>`;
                });
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล กรุณาตรวจสอบ URL API");
                document.getElementById('loading').innerHTML = "โหลดข้อมูลล้มเหลว";
            }
        }

        // เริ่มนำทาง
        function startNavigation() {
            const selected = document.getElementById('package-select').value;
            if (!selected) return alert("กรุณาเลือกแพ็กเกจ");

            // กรองข้อมูลเฉพาะแพ็กเกจที่เลือก และเรียงตาม Step
            currentRoute = allData.filter(item => item.Package === selected).sort((a, b) => a.Step - b.Step);
            
            if (currentRoute.length === 0) return alert("ไม่พบเส้นทางสำหรับแพ็กเกจนี้");

            currentIndex = 0;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('nav-container').style.display = 'flex';
            
            updateNavigationCard();
        }

        // คำนวณระยะทางจากพิกัด (X, Z)
        function calculateDistance(x1, z1, x2, z2) {
            const dx = x2 - x1;
            const dz = z2 - z1;
            return Math.sqrt((dx * dx) + (dz * dz));
        }

        // อัปเดตหน้าจอเมื่อเดินถึงแต่ละจุด
        function updateNavigationCard() {
            const currentPoint = currentRoute[currentIndex];
            let distanceText = "จุดเริ่มต้น";

            // คำนวณระยะทางจากจุดก่อนหน้า (ถ้ามี)
            if (currentIndex > 0) {
                const prevPoint = currentRoute[currentIndex - 1];
                const dist = calculateDistance(prevPoint.X, prevPoint.Z, currentPoint.X, currentPoint.Z);
                distanceText = `เดินอีก ${Math.round(dist)} เมตร`;
            }

            // ใส่ข้อมูลลงใน HTML
            document.getElementById('step-badge').innerText = `จุดที่ ${currentIndex + 1} / ${currentRoute.length}`;
            document.getElementById('distance-badge').innerText = distanceText;
            document.getElementById('location-name').innerText = currentPoint.LocationName;
            document.getElementById('instruction-text').innerText = currentPoint.Instruction;
            document.getElementById('landmark-img').src = currentPoint.ImageURL;
            
            // จัดการปุ่มกด
            const btn = document.getElementById('next-btn');
            if (currentIndex === currentRoute.length - 1) {
                btn.innerText = "เสร็จสิ้นทุกขั้นตอน";
                btn.style.backgroundColor = "#0056b3"; // สีน้ำเงินเมื่อเป็นปุ่มสุดท้าย
            } else {
                btn.innerText = "ฉันถึงจุดนี้แล้ว";
                btn.style.backgroundColor = "#28a745"; // สีเขียวปกติ
            }
        }

        // กดยืนยันว่ามาถึงแล้ว (Visual Confirmation)
        function confirmArrival() {
            if (currentIndex < currentRoute.length - 1) {
                currentIndex++;
                updateNavigationCard();
            } else {
                alert("สิ้นสุดเส้นทาง! ขอให้มีสุขภาพแข็งแรงครับ");
                location.reload(); // โหลดหน้าใหม่เพื่อกลับเมนูหลัก
            }
        }
    </script>
</body>
</html>
