<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital AR Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด A-Frame และ AR.js สำหรับ Location Based AR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js'></script>
    <style>
        body { font-family: 'Kanit', sans-serif; margin: 0; overflow: hidden; }
        .ui-layer { position: absolute; z-index: 1000; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        #ar-scene { display: none; } /* ซ่อน AR ไว้ก่อนจนกว่าจะกดนำทาง */
    </style>
</head>
<body class="bg-slate-50">

    <!-- UI Overlay -->
    <div id="ui-container" class="ui-layer flex flex-col h-full justify-between p-6">
        
        <!-- Header -->
        <div class="interactive bg-white/90 backdrop-blur shadow-lg rounded-2xl p-4 text-center">
            <h1 class="text-2xl font-bold text-blue-600">ระบบนำทางอัจฉริยะ</h1>
            <p class="text-sm text-gray-500" id="status-text">กรุณาเลือกปลายทาง หรือ บันทึกเส้นทาง</p>
        </div>

        <!-- กล่องข้อมูลตรงกลาง (ซ่อนตอนเปิดกล้อง) -->
        <div id="main-menu" class="interactive bg-white p-6 rounded-3xl shadow-xl mt-4">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">จุดหมายปลายทางของคุณ</label>
                <select id="destination-select" class="w-full p-3 border rounded-xl bg-gray-50">
                    <option value="opd">แผนกผู้ป่วยนอก (OPD)</option>
                    <option value="pharmacy">ห้องรับยา</option>
                    <option value="xray">แผนกเอ็กซเรย์</option>
                </select>
            </div>
            <button onclick="startNavigation()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">
                🚀 เริ่มนำทาง (เปิดกล้อง)
            </button>
            <hr class="my-6">
            <button onclick="recordLocation()" class="w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-300 transition">
                📍 โหมดผู้ดูแล: บันทึกจุดปัจจุบัน
            </button>
        </div>

        <!-- Footer / Navigation UI (แสดงตอนเปิดกล้อง) -->
        <div id="nav-ui" class="hidden interactive bg-white/90 backdrop-blur shadow-lg rounded-2xl p-4 text-center mb-4">
            <p class="text-lg font-bold text-gray-800">เดินตามลูกศรบนหน้าจอ</p>
            <button onclick="stopNavigation()" class="mt-2 bg-red-500 text-white px-6 py-2 rounded-lg font-semibold">สิ้นสุดการนำทาง</button>
        </div>
    </div>

    <!-- AR Scene (A-Frame + AR.js) -->
    <a-scene id="ar-scene" vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <!-- ตำแหน่งกล้องจำลอง (จะดึงพิกัด GPS ของมือถือ) -->
        <a-camera gps-camera rotation-reader></a-camera>
        
        <!-- โมเดลลูกศรที่จะถูกเพิ่มผ่าน JS ตามพิกัดปลายทาง -->
        <a-entity id="destination-marker"></a-entity>
    </a-scene>

    <script>
        // ใส่ URL Web App จาก Google Apps Script ของคุณที่นี่
        const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbysouyjSQOeBcRPrE1L5YsgPyhy6kt9mzCNjwWEv4ha_rr8jDXtzPZXsN_zDUOthJ09Ig/exec";

        const mainMenu = document.getElementById('main-menu');
        const navUI = document.getElementById('nav-ui');
        const arScene = document.getElementById('ar-scene');
        const statusText = document.getElementById('status-text');

        // ฟังก์ชันเริ่มนำทาง
        function startNavigation() {
            mainMenu.classList.add('hidden');
            navUI.classList.remove('hidden');
            arScene.style.display = 'block';
            statusText.innerText = "กำลังค้นหาสัญญาณและพิกัด...";

            // สมมติพิกัดปลายทาง (ในการใช้งานจริง ต้องดึงมาจาก Google Sheets)
            // ในที่นี้คือสมมติพิกัดให้เป็นจุดใกล้เคียงกับผู้ใช้
            navigator.geolocation.getCurrentPosition((position) => {
                const targetLat = position.coords.latitude + 0.0001; // ขยับไปนิดหน่อยเพื่อจำลองปลายทาง
                const targetLng = position.coords.longitude + 0.0001;
                
                statusText.innerText = `นำทางไปยังพิกัดเป้าหมาย`;
                createARMarker(targetLat, targetLng);
            }, (error) => {
                alert("ต้องอนุญาตให้เข้าถึงตำแหน่ง (Location) เพื่อใช้งานนำทาง");
            }, { enableHighAccuracy: true });
        }

        // สร้างจุดหมาย 3D บนหน้าจอ AR
        function createARMarker(lat, lng) {
            const marker = document.getElementById('destination-marker');
            marker.innerHTML = ''; // เคลียร์ของเก่า
            
            // สร้างกล่อง/ลูกศร 3 มิติ ชี้เป้าหมาย
            const box = document.createElement('a-box');
            box.setAttribute('color', 'red');
            box.setAttribute('scale', '2 2 2');
            box.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
            marker.appendChild(box);
        }

        // ฟังก์ชันสิ้นสุดนำทาง
        function stopNavigation() {
            mainMenu.classList.remove('hidden');
            navUI.classList.add('hidden');
            arScene.style.display = 'none';
            statusText.innerText = "กรุณาเลือกปลายทาง หรือ บันทึกเส้นทาง";
        }

        // ฟังก์ชันบันทึกพิกัด (Record Mode)
        function recordLocation() {
            statusText.innerText = "กำลังดึงพิกัด GPS...";
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const nodeName = prompt("ตั้งชื่อจุดนี้ (เช่น หน้าลิฟต์ชั้น 1):");
                
                if(nodeName) {
                    statusText.innerText = "กำลังบันทึกลงฐานข้อมูล...";
                    
                    // ส่งข้อมูลไปบันทึกที่ Google Sheets
                    fetch(APPSCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            id: 'node_' + Date.now(),
                            name: nodeName,
                            lat: lat,
                            lng: lng
                        })
                    }).then(res => res.json())
                      .then(data => {
                          alert(`บันทึก ${nodeName} สำเร็จ!`);
                          statusText.innerText = "บันทึกเรียบร้อยแล้ว";
                      }).catch(err => {
                          alert("เกิดข้อผิดพลาดในการบันทึก");
                          statusText.innerText = "ระบบพร้อมใช้งาน";
                      });
                } else {
                    statusText.innerText = "ระบบพร้อมใช้งาน";
                }
            }, (error) => {
                alert("ไม่สามารถดึงพิกัดได้ กรุณาเปิด GPS");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
