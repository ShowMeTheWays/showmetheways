<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hospital AR Navigator</title>
    <!-- โหลด A-Frame สำหรับทำ WebAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; overflow: hidden; }
        #ui-container {
            position: absolute; top: 10px; left: 10px; right: 10px;
            z-index: 1000; background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button, select, input {
            width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 5px;
            border-radius: 5px; border: 1px solid #ccc; font-size: 16px;
        }
        .btn-record { background-color: #ff4757; color: white; border: none; font-weight: bold; }
        .btn-save { background-color: #2ed573; color: white; border: none; font-weight: bold; }
        .btn-load { background-color: #1e90ff; color: white; border: none; font-weight: bold; }
        #status { font-size: 14px; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-container">
        <h3 style="margin-top: 0; margin-bottom: 10px; text-align: center;">AR ระบบนำทางโรงพยาบาล</h3>
        
        <div id="record-section">
            <input type="text" id="route-name" placeholder="ชื่อเส้นทาง (เช่น ไปแผนกฉุกเฉิน)">
            <button class="btn-record" id="btn-record" onclick="toggleRecord()">🔴 เริ่มบันทึกเส้นทาง</button>
            <button class="btn-save" id="btn-save" onclick="saveRoute()" style="display:none;">💾 บันทึกและส่งขึ้นระบบ</button>
        </div>

        <hr>

        <div id="load-section">
            <button class="btn-load" onclick="fetchRoutes()">🔄 โหลดเส้นทางที่มี</button>
            <select id="route-select" style="display:none;" onchange="drawSelectedRoute()">
                <option value="">-- เลือกเส้นทาง --</option>
            </select>
        </div>

        <div id="status">สถานะ: รอคำสั่ง... <br><small>*กรุณายืนจุดเริ่มต้นให้ตรงกันเสมอ</small></div>
    </div>

    <!-- AR Scene -->
    <a-scene webxr="optionalFeatures: hit-test;" renderer="antialias: true; colorManagement: true;">
        <!-- กล้องและตัวจับพิกัด -->
        <a-camera id="user-camera" position="0 1.6 0"></a-camera>
        
        <!-- Container สำหรับใส่จุดนำทาง (Breadcrumbs) -->
        <a-entity id="path-container"></a-entity>
    </a-scene>

    <script>
        // === ตั้งค่า Google Apps Script Web App URL ที่นี่ ===
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzx3T1m5Rm5PrFQD3rAsycBsuERP_ZUauV4DiXbZJZ-zTnq6bVuEVz1z5ott-hmbrzbuQ/exec';

        let isRecording = false;
        let recordedPath = [];
        let recordInterval;
        let allRoutes = [];

        const camera = document.getElementById('user-camera');
        const statusDiv = document.getElementById('status');
        const pathContainer = document.getElementById('path-container');

        // 1. ฟังก์ชันเปิด/ปิดการบันทึก
        function toggleRecord() {
            if (!isRecording) {
                // เริ่มบันทึก
                isRecording = true;
                recordedPath = [];
                document.getElementById('btn-record').innerText = "⏹️ หยุดบันทึก";
                document.getElementById('btn-record').style.backgroundColor = "#ffa502";
                document.getElementById('btn-save').style.display = "none";
                statusDiv.innerText = "สถานะ: กำลังบันทึกพิกัด...";
                
                // เคลียร์เส้นทางเก่า
                pathContainer.innerHTML = '';

                // บันทึกพิกัดทุกๆ 1 วินาที
                recordInterval = setInterval(() => {
                    const pos = camera.getAttribute('position');
                    // บันทึกเฉพาะเมื่อมีการเดินขยับไปจากจุดเดิมเล็กน้อย (ป้องกันพิกัดซ้ำเยอะเกิน)
                    if(recordedPath.length === 0 || calculateDistance(recordedPath[recordedPath.length-1], pos) > 0.5) {
                        recordedPath.push({x: pos.x, y: pos.y, z: pos.z});
                        drawBreadcrumb(pos.x, pos.y, pos.z, "#ff4757"); // สีแดงตอนกำลังอัด
                    }
                }, 1000);
            } else {
                // หยุดบันทึก
                isRecording = false;
                clearInterval(recordInterval);
                document.getElementById('btn-record').innerText = "🔴 เริ่มบันทึกเส้นทางใหม่";
                document.getElementById('btn-record').style.backgroundColor = "#ff4757";
                document.getElementById('btn-save').style.display = "block";
                statusDiv.innerText = `สถานะ: บันทึกเสร็จสิ้น (${recordedPath.length} จุด)`;
            }
        }

        // 2. ฟังก์ชันส่งข้อมูลขึ้น Google Sheet
        async function saveRoute() {
            const routeName = document.getElementById('route-name').value || "เส้นทางไม่ระบุชื่อ";
            if (recordedPath.length === 0) {
                alert("ยังไม่มีข้อมูลเส้นทาง กรุณาเดินบันทึกก่อนครับ");
                return;
            }

            statusDiv.innerText = "สถานะ: กำลังส่งข้อมูล...";
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        routeName: routeName,
                        pathData: recordedPath
                    })
                });
                const result = await response.json();
                if(result.status === 'success') {
                    statusDiv.innerText = "สถานะ: บันทึกขึ้นระบบสำเร็จ!";
                    document.getElementById('btn-save').style.display = "none";
                }
            } catch (error) {
                statusDiv.innerText = "สถานะ: เกิดข้อผิดพลาดในการบันทึก";
                console.error(error);
            }
        }

        // 3. ฟังก์ชันดึงข้อมูลเส้นทางทั้งหมด
        async function fetchRoutes() {
            statusDiv.innerText = "สถานะ: กำลังโหลดเส้นทาง...";
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                
                if (result.status === 'success') {
                    allRoutes = result.routes;
                    const select = document.getElementById('route-select');
                    select.innerHTML = '<option value="">-- เลือกเส้นทางเพื่อนำทาง --</option>';
                    
                    allRoutes.forEach((route, index) => {
                        select.innerHTML += `<option value="${index}">${route.name}</option>`;
                    });
                    
                    select.style.display = "block";
                    statusDiv.innerText = "สถานะ: โหลดสำเร็จ กรุณาเลือกเส้นทาง";
                }
            } catch (error) {
                statusDiv.innerText = "สถานะ: โหลดข้อมูลล้มเหลว";
                console.error(error);
            }
        }

        // 4. ฟังก์ชันวาดเส้นทางที่เลือก (จุดนำทางเรืองแสง)
        function drawSelectedRoute() {
            const select = document.getElementById('route-select');
            const routeIndex = select.value;
            if(routeIndex === "") return;

            const selectedRoute = allRoutes[routeIndex];
            pathContainer.innerHTML = ''; // ล้างของเก่า
            
            selectedRoute.pathData.forEach((pos, i) => {
                // สร้าง Animation ให้จุดนำทางค่อยๆ ปรากฏและขยับขึ้นลง (Floating Effect)
                drawBreadcrumb(pos.x, pos.y, pos.z, "#1dd1a1", true); 
            });

            statusDiv.innerText = `สถานะ: กำลังนำทางไป "${selectedRoute.name}"`;
        }

        // ฟังก์ชันช่วยเหลือ: วาดจุด (Sphere) เรืองแสง
        function drawBreadcrumb(x, y, z, color, animate = false) {
            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('position', `${x} ${y - 0.5} ${z}`); // ให้อยู่ต่ำลงมาใกล้พื้น
            sphere.setAttribute('radius', '0.15');
            // ทำวัสดุเรืองแสง
            sphere.setAttribute('material', `color: ${color}; shader: flat; transparent: true; opacity: 0.8;`);
            
            if(animate) {
                // ทำให้ลูกแก้วนำทางลอยขึ้นลงเบาๆ และเรืองแสงน่ามอง
                sphere.setAttribute('animation', `property: position; dir: alternate; dur: 1500; easing: easeInOutSine; loop: true; to: ${x} ${y - 0.3} ${z}`);
            }

            pathContainer.appendChild(sphere);
        }

        // ฟังก์ชันช่วยเหลือ: คำนวณระยะห่างระหว่าง 2 จุด (แกน x, z)
        function calculateDistance(pos1, pos2) {
            const dx = pos1.x - pos2.x;
            const dz = pos1.z - pos2.z;
            return Math.sqrt(dx * dx + dz * dz);
        }
    </script>
</body>
</html>
